$kind: http-request
name: 'TC07 - stock là chuỗi chữ'
method: POST
url: 'http://localhost:5000/api/products'
order: 7000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {"name": "San pham test", "price": 100000, "stock": "xyz"}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("TC07 - stock='xyz': Phải trả về 400", function () {
          pm.response.to.have.status(400);
      });
      pm.test("TC07 - Response có error message", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("error");
      });
      pm.test("TC07 - Response time < 3000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(3000);
      });
      console.log("TC07 Status:", pm.response.code, "| Time:", pm.response.responseTime + "ms");